# .github/workflows/validate.yml
name: Validate Public Core

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    name: Validate repository structure and docs
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify required canonical files exist
        run: |
          set -euo pipefail

          required_files=(
            "CANONICAL_SOURCE_LOCK.md"
            "README.md"
            "ai-interaction-methodology/ai-interaction-methodology.md"
            "ai-interaction-framework/framework.md"
            "ai-collaboration-guidelines/ai-collaboration-guidelines.md"
          )

          for file in "${required_files[@]}"; do
            if [ ! -f "$file" ]; then
              echo "Missing required file: $file"
              exit 1
            fi
          done

          echo "Required canonical files are present."

      - name: Verify supporting directory references resolve if present
        run: |
          set -euo pipefail

          optional_files=(
            "supporting/ai-interaction-framework-node-architecture.md"
            "supporting/ai-interaction-methodology-runtime-architecture.md"
          )

          for file in "${optional_files[@]}"; do
            if [ -e "$file" ] && [ ! -f "$file" ]; then
              echo "Path exists but is not a regular file: $file"
              exit 1
            fi
          done

          echo "Optional supporting file paths look valid."